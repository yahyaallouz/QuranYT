name: Automated Quran Shorts

on:
  schedule:
    # Runs at 09:00, 13:00, and 17:00 UTC every day
    - cron: '0 9,13,17 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  generate_and_upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg and Amiri font
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fontconfig fonts-hosny-amiri
          fc-cache -fv

      - name: Setup Secrets
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: python -c "import os; open('token.json','w').write(os.environ['YOUTUBE_TOKEN'])"

      - name: Run Main Workflow
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GITHUB_ACTIONS: "1" # Toggles the automated git commit
        run: python main.py
