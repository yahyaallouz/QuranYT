name: Automated Quran Shorts

on:
  schedule:
    # Trigger every 2 hours between 08:00-22:00 UTC
    # schedule_checker.py inside main.py decides whether to actually post
    - cron: '0 8,10,12,14,16,18,20,22 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  generate_and_upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg, fonts, and Arabic shaping libraries
        run: |
          # Retry apt-get update with fallback mirror (Azure mirrors can have DNS issues)
          for i in 1 2 3; do
            sudo apt-get update && break
            echo "apt-get update failed (attempt $i/3), switching to fallback mirror..."
            sudo sed -i 's|http://azure.archive.ubuntu.com|http://archive.ubuntu.com|g' /etc/apt/sources.list || true
            sudo sed -i 's|http://azure.archive.ubuntu.com|http://archive.ubuntu.com|g' /etc/apt/sources.list.d/*.list 2>/dev/null || true
            sleep 5
          done
          sudo apt-get install -y ffmpeg fontconfig fonts-hosny-amiri libraqm-dev libfribidi-dev
          fc-cache -fv
          # Reinstall Pillow so it picks up libraqm for RAQM layout engine
          pip install --force-reinstall Pillow

      - name: Setup Secrets
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: python -c "import os; open('token.json','w').write(os.environ['YOUTUBE_TOKEN'])"

      - name: Run Main Workflow
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GITHUB_ACTIONS: "1"
        run: python main.py
