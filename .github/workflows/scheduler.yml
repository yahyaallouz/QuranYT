name: Automated Quran Shorts

on:
  schedule:
    # Trigger every 2 hours between 08:00-22:00 UTC
    # schedule_checker.py inside main.py decides whether to actually post
    - cron: '0 8,10,12,14,16,18,20,22 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  generate_and_upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg, fonts, and Arabic shaping libraries
        run: |
          # Fix Azure mirror DNS issues on GitHub Actions
          sudo sed -i 's|azure.archive.ubuntu.com|archive.ubuntu.com|g' /etc/apt/apt-mirrors.txt 2>/dev/null || true
          sudo sed -i 's|azure.archive.ubuntu.com|archive.ubuntu.com|g' /etc/apt/sources.list 2>/dev/null || true
          sudo sed -i 's|azure.archive.ubuntu.com|archive.ubuntu.com|g' /etc/apt/sources.list.d/*.list 2>/dev/null || true
          sudo sed -i 's|azure.archive.ubuntu.com|archive.ubuntu.com|g' /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          # Retry apt-get update + install (Azure DNS can be flaky)
          for i in 1 2 3; do
            sudo apt-get update -y && \
            sudo apt-get install -y --fix-missing ffmpeg fontconfig fonts-hosny-amiri libraqm-dev libfribidi-dev && \
            break || (echo "Attempt $i failed, retrying in 10s..."; sleep 10)
          done
          fc-cache -fv
          pip install --force-reinstall Pillow

      - name: Setup Secrets
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: python -c "import os; open('token.json','w').write(os.environ['YOUTUBE_TOKEN'])"

      - name: Run Main Workflow
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GITHUB_ACTIONS: "1"
        run: python main.py
